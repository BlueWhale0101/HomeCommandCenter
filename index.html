<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Household Command Center</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app" class="kitchen">

  <header class="k-header">
    <div id="date"></div>
    <div id="clock"></div>
  </header>

  <section class="k-section">
    <h2>Today</h2>
    <div id="today-list"></div>
  </section>

  <section class="k-section">
    <h2>Needs Attention</h2>
    <div id="attention-list"></div>
  </section>

  <section class="k-section">
    <h2>Don't Forget</h2>
    <div id="reminder-list"></div>
  </section>

  <section class="k-actions">
    <button onclick="logAction('kitchen_cleaned')">Kitchen Cleaned</button>
    <button onclick="logAction('dishes_done')">Dishes Done</button>
    <button onclick="logAction('bins_out')">Bins Out</button>
  </section>

</div>

<div class="version-pill">v0.8.0-dev</div>

<script src="app.js" defer></script>
</body>
</html>
